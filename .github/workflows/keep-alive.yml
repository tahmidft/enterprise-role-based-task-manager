name: Keep Alive

on:
  schedule:
    # Every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    name: Ping API health endpoint
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/health
        if: ${{ secrets.RENDER_API_URL != '' }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_API_URL }}/api/health")
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: health check returned $STATUS"
          fi
