<div class="page">
  <div *ngIf="isLoading()" class="loading-wrap">
    <mat-spinner diameter="36"></mat-spinner>
  </div>

  <mat-card *ngIf="error()" class="error-card">
    <mat-card-content>{{ error() }}</mat-card-content>
  </mat-card>

  <ng-container *ngIf="data() as d">
    <section class="metric-cards">
      <mat-card><mat-card-title>Total Tasks</mat-card-title><mat-card-content>{{ d.totalTasks }}</mat-card-content></mat-card>
      <mat-card><mat-card-title>Open Tasks</mat-card-title><mat-card-content>{{ d.openTasks }}</mat-card-content></mat-card>
      <mat-card><mat-card-title>Overdue</mat-card-title><mat-card-content>{{ d.overdueTasks }}</mat-card-content></mat-card>
      <mat-card><mat-card-title>Completion</mat-card-title><mat-card-content>{{ completionPct() }}%</mat-card-content></mat-card>
      <mat-card><mat-card-title>Active Users (30d)</mat-card-title><mat-card-content>{{ d.activeUsers }}</mat-card-content></mat-card>
    </section>

    <section class="chart-grid">
      <mat-card>
        <mat-card-title>Tasks by Status</mat-card-title>
        <mat-card-content>
          <canvas *ngIf="Object.keys(d.tasksByStatus).length > 0" #statusChart></canvas>
          <p *ngIf="Object.keys(d.tasksByStatus).length === 0" class="muted">No task data yet</p>
        </mat-card-content>
      </mat-card>
      <mat-card>
        <mat-card-title>Tasks by Priority</mat-card-title>
        <mat-card-content>
          <canvas *ngIf="Object.keys(d.tasksByPriority).length > 0" #priorityChart></canvas>
          <p *ngIf="Object.keys(d.tasksByPriority).length === 0" class="muted">No task data yet</p>
        </mat-card-content>
      </mat-card>
      <mat-card class="full-width">
        <mat-card-title>Audit Activity (30 days)</mat-card-title>
        <mat-card-content>
          <canvas *ngIf="d.auditActivityLast30Days.length > 0" #activityChart></canvas>
          <p *ngIf="d.auditActivityLast30Days.length === 0" class="muted">No audit activity yet</p>
        </mat-card-content>
      </mat-card>
    </section>
  </ng-container>
</div>
