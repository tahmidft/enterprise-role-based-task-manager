<div class="auth-wrap">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Create account</mat-card-title>
      <mat-card-subtitle>Start managing enterprise projects</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
        <mat-form-field appearance="outline">
          <mat-label>Full Name</mat-label>
          <input matInput formControlName="name" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Organization Name</mat-label>
          <input matInput formControlName="organizationName" />
        </mat-form-field>

        <p *ngIf="errorMessage()" class="error">{{ errorMessage() }}</p>

        <button mat-flat-button color="primary" type="submit" [disabled]="isLoading() || registerForm.invalid">
          {{ isLoading() ? 'Creating account...' : 'Create account' }}
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions>
      <a routerLink="/login">Already have an account? Sign in</a>
    </mat-card-actions>
  </mat-card>
</div>
